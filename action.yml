name: "Dazbo's Gemini Review & Triage"
description: "Automated Pull Request code reviews and Issue Triage using Google Gemini"
author: 'Dazbo (derailed-dash)'

# Note: To control which files trigger this action, configure `paths` or `paths-ignore`
# in the calling workflow's trigger configuration (e.g. in `.github/workflows/gemini-review.yml`).
#
# Examples:
#   on:
#     pull_request:
#       paths:
#         - 'src/**'           # Inclusion  : only trigger on files under src/
#         - '!src/**/*.enc'    # Exclusion: do not trigger on encrypted files
#
#       # Alternatively, exclude files/directories entirely:
#       # paths-ignore:
#       #   - 'docs/**'
#       #   - '**.md'

inputs:
  gemini_api_key:
    description: 'API key for Gemini'
    required: true
  github_token:
    description: 'GitHub token (defaults to secrets.GITHUB_TOKEN)'
    required: true
  gemini_model:
    description: 'Gemini model to use'
    required: false
    default: 'gemini-3.6-flash'
  command:
    description: 'Command to run (review, triage)'
    required: false
    default: 'review'
  language:
    description: 'Language to use for the review comments (e.g. English (UK), English (US), French, Spanish)'
    required: false
    default: 'English (UK)'
  timeout:
    description: 'Timeout for API requests in seconds'
    required: false
    default: '60'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Run Script
      shell: bash
      env:
        GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GEMINI_MODEL: ${{ inputs.gemini_model }}
        GEMINI_LANGUAGE: ${{ inputs.language }}
        GEMINI_TIMEOUT: ${{ inputs.timeout }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
      run: |
        if [ "${{ inputs.command }}" = "triage" ]; then
          uv run ${{ github.action_path }}/gemini_issue_triage.py
        else
          uv run ${{ github.action_path }}/gemini_pr_review.py
        fi

branding:
  icon: 'eye'
  color: 'purple'

